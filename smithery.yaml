# Smithery Konfiguration für Solana MCP Server
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - heliusApiKey
    properties:
      heliusApiKey:
        type: string
        description: "Helius API Key (kostenlos: https://dev.helius.xyz)"
      jupiterApiKey:
        type: string
        description: "Jupiter API Key (optional, kostenlos: https://portal.jup.ag)"
  commandFunction: |
    (config) => ({
      "command": "uvx",
      "args": ["solana-mcp-server"],
      "env": {
        "HELIUS_API_KEY": config.heliusApiKey,
        "JUPITER_API_KEY": config.jupiterApiKey || ""
      }
    })
